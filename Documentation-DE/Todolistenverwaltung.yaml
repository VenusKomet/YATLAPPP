openapi: 3.0.3
info:
  title: Todo-Listen API
  version: 1.0.0
  description: REST-Schnittstelle zur Verwaltung von Todo-Listen und deren Einträgen.
  license:
    name: MIT License
    url: https://opensource.org/license/mit

servers:
  - url: http://127.0.0.1:5000/
  
paths:
  /todo-list:
    get:
      summary: Alle Todo-Listen abrufen
      responses:
        '200':
          description: Liste aller Todo-Listen
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TodoList'
    post:
      summary: Neue Todo-Liste anlegen
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TodoListCreate'
      responses:
        '201':
          description: Todo-Liste erfolgreich erstellt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TodoList'
        '400':
          description: Ungültiger Request-Body

  /todo-list/{list_id}:
    get:
      summary: Alle Einträge einer Todo-Liste abrufen
      parameters:
        - name: list_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Liste aller Einträge der gegebenen Liste
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TodoEntry'
        '404':
          description: Liste mit dieser ID wurde nicht gefunden
    delete:
      summary: Eine komplette Todo-Liste löschen
      parameters:
        - name: list_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Liste erfolgreich gelöscht
        '404':
          description: Liste mit dieser ID wurde nicht gefunden
    post:
      summary: Eintrag zu bestehender Todo-Liste hinzufügen
      parameters:
        - name: list_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TodoEntryCreate'
      responses:
        '201':
          description: Eintrag erfolgreich erstellt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TodoEntry'
        '400':
          description: Ungültiger Request-Body
        '404':
          description: Liste mit dieser ID wurde nicht gefunden

  /todo-list/entry/{entry_id}:
    patch:
      summary: Bestehenden Eintrag aktualisieren
      parameters:
        - name: entry_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TodoEntryUpdate'
      responses:
        '200':
          description: Eintrag erfolgreich aktualisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TodoEntry'
        '400':
          description: Ungültiger Request-Body
        '404':
          description: Eintrag mit dieser ID wurde nicht gefunden
    delete:
      summary: Einzelnen Eintrag löschen
      parameters:
        - name: entry_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Eintrag erfolgreich gelöscht
        '404':
          description: Eintrag mit dieser ID wurde nicht gefunden

components:
  schemas:
    TodoList:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
      required:
        - id
        - name

    TodoListCreate:
      type: object
      properties:
        name:
          type: string
      required:
        - name

    TodoEntry:
      type: object
      properties:
        id:
          type: string
        list:
          type: string
        name:
          type: string
        description:
          type: string
      required:
        - id
        - list
        - name

    TodoEntryCreate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
      required:
        - name

    TodoEntryUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string

  responses:
    TooManyRequests:
      description: Zu viele Anfragen
    ServerError:
      description: Interner Serverfehler
    InvalidMethod:
      description: Ungültige HTTP-Methode für diesen Endpunkt
    InvalidEndpoint:
      description: Ungültiger Endpunkt

  # Optional: globale Fehlercodes als Beispiel
  # Diese können über $ref in den einzelnen Operationen verwendet werden